version: 1

projects:
  - id: agent-marketplace
    description: Central registry for agent plugins (MCPs, skills, commands, hooks)
    provider: github
    path: Seretos/agent-marketplace
    token_env: GITHUB_TOKEN
    permissions:
      issues:
        create: true
        modify: true

  - id: agent-plugin-dev
    description: ""
    provider: github
    path: Seretos/agent-plugin-dev
    token_env: GITHUB_TOKEN
    permissions:
      issues:
        create: true
        modify: true
      pulls:
        create: true
        modify: true
        merge: true

  - id: agent-vdesktop
    description: Microsoft Virtual Desktop management MCP plugin for Claude Code
    provider: github
    path: Seretos/agent-vdesktop
    token_env: GITHUB_TOKEN
    permissions:
      issues:
        create: true
        modify: true
      pulls:
        create: true
        modify: true
        merge: true

