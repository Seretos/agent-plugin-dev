name: dispatch-to-marketplace

# Manual recovery tool. The normal release flow (release.yml) dispatches to
# the marketplace itself. Use this only when:
#   - The marketplace dispatch step in release.yml failed and you want to
#     retry without re-running the whole build.
#   - You need to re-publish an existing release to the marketplace (e.g.
#     after the app-marketplace.json schema changed).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to dispatch (e.g. {{app_name}}--v0.0.1)"
        required: true
        type: string

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          # Tag format: <app-name>--v<version>. Strip everything up to and including "--v".
          VERSION="${TAG##*--v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Verify package.json version matches tag
        shell: bash
        run: |
          PJ_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          # package.json on main is the 0.0.0 placeholder (version is pipeline-
          # owned and never committed), so allow that; only fail on a real
          # mismatch where the file was hand-stamped to a different version.
          if [ "$PJ_VERSION" != "$TAG_VERSION" ] && [ "$PJ_VERSION" != "0.0.0" ]; then
            echo "::error::package.json at tag is v$PJ_VERSION, but you asked to dispatch v$TAG_VERSION."
            exit 1
          fi

      - name: Read app metadata from package.json
        id: meta
        shell: bash
        run: |
          DESC=$(jq -r '.description' package.json)
          NAME=$(jq -r '.name'        package.json)
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"        >> "$GITHUB_OUTPUT"

      - name: Dispatch to agent-marketplace
        env:
          GH_PAT:  ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          NAME:    ${{ steps.meta.outputs.name }}
          DESC:    ${{ steps.meta.outputs.description }}
          VERSION: ${{ steps.tag.outputs.version }}
          TAG:     ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          # Recompute the downloads map from the deterministic artifactName
          # pattern (${name}-${version}-${os}.${ext}) and the version parsed
          # from the tag. Matches what release.yml computed.
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          WIN_URL="${BASE}/${NAME}-${VERSION}-windows.exe"
          MAC_URL="${BASE}/${NAME}-${VERSION}-mac.dmg"
          LINUX_URL="${BASE}/${NAME}-${VERSION}-linux.AppImage"
          DOWNLOADS=$(jq -nc \
            --arg win "$WIN_URL" \
            --arg mac "$MAC_URL" \
            --arg linux "$LINUX_URL" \
            '{windows: $win, macos: $mac, linux: $linux}')

          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Seretos/agent-marketplace/dispatches \
            -d @- <<EOF
          {
            "event_type": "app-release",
            "client_payload": {
              "name":        "${NAME}",
              "description": "${DESC}",
              "repo":        "${{ github.repository }}",
              "category":    "app",
              "version":     "${VERSION}",
              "ref":         "${TAG}",
              "icon":            "https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/assets/icon.png",
              "description_url": "https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/description.md",
              "downloads":   ${DOWNLOADS}
            }
          }
          EOF
