name: release

# Electron + TypeScript app release pipeline.
#
# Shape: Stamp -> Matrix-Build (one installer per OS) -> Assembly.
#   1. stamp:    one-shot Linux runner validates semver, fails if the tag
#                already exists, stamps the version into package.json
#                (CI only, NEVER committed), and uploads the stamped source
#                so every build job pulls the same version.
#   2. build:    matrix job; one runner per OS (windows/macos/ubuntu). Each
#                runs `npm ci`, `npm run build` (tsc), then electron-builder
#                for its OS, and uploads the produced installer from release/
#                as an OS-tagged artifact.
#   3. assemble: Linux runner checks out main (to get the release commit SHA),
#                downloads all installers, creates the tag + GitHub Release on
#                that SHA with the installers attached, then dispatches an
#                `app-release` event to the marketplace.
#
# Tag-on-main (no orphan branch): unlike the plugin templates this is an app,
# not an install-from-zip plugin. The tag is created on the current main
# commit, so assets/icon.png and description.md already exist at the tagged
# commit and their raw.githubusercontent.com/${repo}/${TAG}/... URLs resolve
# without staging a separate branch.
#
# electron-builder uses a deterministic artifactName
# (${name}-${version}-${os}.${ext}, set in package.json "build"), so the
# installer filenames are predictable and the downloads map can be computed
# here without querying the release assets.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, no leading v) e.g. 0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # 1. Validate + stamp version, share the stamped source tree.
  # ------------------------------------------------------------------
  stamp:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      tag:      ${{ steps.meta.outputs.tag }}
    steps:
      - name: Validate version is semver
        shell: bash
        run: |
          V="${{ inputs.version }}"
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$V' is not valid semver (expected MAJOR.MINOR.PATCH[-PRERELEASE])."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if tag already exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_NAME=$(jq -r '.name' package.json)
          TAG="${APP_NAME}--v${{ inputs.version }}"
          if gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Delete it first or pick a new version."
            exit 1
          fi

      - name: Stamp version into package.json (CI only, not committed)
        shell: bash
        run: |
          V="${{ inputs.version }}"
          tmp=$(mktemp)
          jq --arg v "$V" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json
          echo "Stamped version $V"
          jq -r '.version' package.json

      - name: Export app metadata
        id: meta
        shell: bash
        run: |
          APP_NAME=$(jq -r '.name' package.json)
          TAG="${APP_NAME}--v${{ inputs.version }}"
          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"

      - name: Upload stamped source tree
        uses: actions/upload-artifact@v4
        with:
          name: stamped-source
          # v4 excludes dotfiles/dotdirs by default; downstream jobs need
          # .github/ etc. in the downloaded tree.
          include-hidden-files: true
          path: |
            .
            !.git
          if-no-files-found: error
          retention-days: 1

  # ------------------------------------------------------------------
  # 2. Matrix build - one installer per OS, each uploaded as an artifact.
  # ------------------------------------------------------------------
  build:
    needs: stamp
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact_os: windows
          - os: macos-latest
            target: mac
            artifact_os: mac
          - os: ubuntu-latest
            target: linux
            artifact_os: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Download stamped source
        uses: actions/download-artifact@v4
        with:
          name: stamped-source

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Package installer (${{ matrix.target }})
        # --publish never: electron-builder must not try to push to a provider;
        # release.yml owns publishing via gh release create in the assemble job.
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.artifact_os }}
          # The deterministic artifactName lands the installer in release/. Grab
          # only the top-level installer files (electron-builder also emits
          # blockmaps / latest*.yml metadata we don't ship as the download).
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
          if-no-files-found: error
          retention-days: 1

  # ------------------------------------------------------------------
  # 3. Assembly - tag on main, publish Release, dispatch to marketplace.
  # ------------------------------------------------------------------
  assemble:
    needs: [stamp, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (need the release commit SHA to tag)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: installers/
          merge-multiple: true

      - name: List downloaded installers
        shell: bash
        run: |
          echo "=== installers/ ==="
          ls -la installers/

      - name: Create tag and GitHub Release on main commit
        id: rel
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.stamp.outputs.tag }}"
          SHA=$(git rev-parse HEAD)
          # Tag straight on the current main commit so icon.png / description.md
          # resolve at the tag without an orphan branch.
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --target "$SHA" \
            --title "$TAG" \
            --generate-notes \
            ${{ contains(inputs.version, '-') && '--prerelease' || '' }} \
            installers/*
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      # Tags created via GITHUB_TOKEN don't fire downstream push:tags workflows
      # (Actions blocks this to prevent recursive loops). Call the marketplace
      # directly with a separate PAT.
      - name: Dispatch to agent-marketplace
        shell: bash
        env:
          GH_PAT:  ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          VERSION: ${{ inputs.version }}
          NAME:    ${{ needs.stamp.outputs.app_name }}
          TAG:     ${{ needs.stamp.outputs.tag }}
        run: |
          DESC=$(jq -r '.description' package.json)
          # Build the downloads map: platform -> Release asset download URL.
          # Asset names come from electron-builder's deterministic artifactName
          # ${name}-${version}-${os}.${ext}: windows->exe, mac->dmg, linux->AppImage.
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          WIN_URL="${BASE}/${NAME}-${VERSION}-windows.exe"
          MAC_URL="${BASE}/${NAME}-${VERSION}-mac.dmg"
          LINUX_URL="${BASE}/${NAME}-${VERSION}-linux.AppImage"
          DOWNLOADS=$(jq -nc \
            --arg win "$WIN_URL" \
            --arg mac "$MAC_URL" \
            --arg linux "$LINUX_URL" \
            '{windows: $win, macos: $mac, linux: $linux}')

          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Seretos/agent-marketplace/dispatches \
            -d @- <<EOF
          {
            "event_type": "app-release",
            "client_payload": {
              "name":        "${NAME}",
              "description": "${DESC}",
              "repo":        "${{ github.repository }}",
              "category":    "app",
              "version":     "${VERSION}",
              "ref":         "${TAG}",
              "icon":            "https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/assets/icon.png",
              "description_url": "https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/description.md",
              "downloads":   ${DOWNLOADS}
            }
          }
          EOF
