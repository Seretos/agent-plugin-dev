name: open-dep-ticket

# Manual recovery workflow: re-file the dependency-update ticket in one or
# more downstream consumer repos when release.yml's automatic notification
# step was skipped or failed (e.g. CONSUMER_TICKET_TOKEN was missing or
# expired at release time, or a consumer repo was added after the release).
#
# Same notification logic as release.yml's "Open dependency-update tickets in
# consumers" step, with two differences:
#   - consumers come from a workflow_dispatch input, not the hardcoded
#     CONSUMERS env list, so you re-file ad hoc without editing release.yml;
#   - the job is NOT continue-on-error, so any consumer that fails turns the
#     run red and the ::error:: annotation names exactly which one to fix.
#
# It is idempotent: each consumer is checked for an open issue with the exact
# same title before one is created, so running it twice is safe.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "{{lib_name}} version to reference (semver, no leading v) e.g. 0.2.0"
        required: true
        type: string
      consumers:
        description: "Consumer repos to notify — one 'owner/repo' per line (commas also work)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  file-tickets:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Validate version is semver
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::version must be semver without a leading 'v' (e.g. 0.2.0), got: $VERSION"
            exit 1
          fi

      - name: Open dependency-update tickets in consumers
        shell: bash
        # CONSUMERS / TITLE / BODY live in env (not a run-block heredoc): a
        # heredoc body at column 0 dedents out of the YAML block scalar and
        # breaks the file. A YAML block scalar holds the markdown verbatim and
        # ${{ }} still expands; bash just references the variables.
        env:
          GH_TOKEN: ${{ secrets.CONSUMER_TICKET_TOKEN }}
          CONSUMERS: ${{ inputs.consumers }}
          TITLE: "chore(deps): bump {{lib_name}} to v${{ inputs.version }}"
          BODY: |
            ## Dependency update

            A new release of **{{lib_name}}** has been published: `v${{ inputs.version }}`.

            ### Action required

            1. Update the pin in `pyproject.toml` to:
               ```
               {{lib_name}} @ git+https://github.com/Seretos/{{lib_name}}@v${{ inputs.version }}
               ```
            2. Run this project's test suite to confirm nothing broke.
            3. Commit the bump and open a PR.
        run: |
          # Normalize commas to newlines so the input accepts either form.
          NORMALIZED="$(printf '%s\n' "$CONSUMERS" | tr ',' '\n')"
          failed=0
          # Loop in the current shell (here-string, not a pipe) so $failed
          # survives to the final exit.
          while IFS= read -r RAW; do
            CONSUMER="$(printf '%s' "$RAW" | xargs)"   # trim surrounding space
            [ -z "$CONSUMER" ] && continue

            # Idempotency: skip if an open issue with this exact title already
            # exists. --paginate follows all pages; jq drops pull requests.
            EXISTING=$(gh api --paginate "repos/${CONSUMER}/issues?state=open&per_page=100" \
              --jq 'map(select(.pull_request|not)) | .[].title' 2>/dev/null || true)
            if printf '%s\n' "$EXISTING" | grep -qxF "$TITLE"; then
              echo "Issue already exists in ${CONSUMER}, skipping."
              continue
            fi

            # Attempt with the 'dependencies' label; retry without it if the
            # consumer repo does not define that label.
            if gh issue create --repo "$CONSUMER" --title "$TITLE" --body "$BODY" --label dependencies \
               || gh issue create --repo "$CONSUMER" --title "$TITLE" --body "$BODY"; then
              echo "Ticket opened in ${CONSUMER}."
            else
              echo "::error::Filing in ${CONSUMER} failed (check CONSUMER_TICKET_TOKEN scope for that repo)."
              failed=1
            fi
          done <<< "$NORMALIZED"
          exit $failed
